<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ROS Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

<div id="app-layout">
  <!-- ── Sidebar ─────────────────────────────────────────── -->
  <aside id="sidebar">
    <div class="sidebar-brand">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="2">
        <circle cx="12" cy="12" r="10"/>
        <circle cx="12" cy="12" r="3"/>
        <line x1="12" y1="2" x2="12" y2="5"/>
        <line x1="12" y1="19" x2="12" y2="22"/>
        <line x1="2" y1="12" x2="5" y2="12"/>
        <line x1="19" y1="12" x2="22" y2="12"/>
      </svg>
      <span class="brand-name">ROS Dashboard</span>
    </div>

    <div class="ros-status" id="ros-status-wrap">
      <div class="ros-dot" id="ros-dot"></div>
      <span id="ros-label">Verificando…</span>
    </div>

    <div class="sidebar-scroll">
      <ul class="nav-list">
        <li class="nav-item active" id="nav-config" onclick="App.showTab('config')">⚙ Configurações</li>
      </ul>

      <div class="nav-section">
        <h4>Janelas</h4>
        <ul class="nav-list" id="nav-windows">
          <!-- Populated via JS -->
        </ul>
        <div style="display:flex; gap:8px; margin-top:8px;">
          <button class="btn btn-ghost" style="flex:1; justify-content:center; padding:6px" onclick="App.openNewWindowModal()">
            + Janela
          </button>
          <button class="btn btn-ghost" style="flex:1; justify-content:center; padding:6px" title="Geração em Lote" onclick="App.openBatchModal()">
            🪄 Lote
          </button>
        </div>
      </div>
    </div>
  </aside>

  <!-- ── Main Area ───────────────────────────────────────── -->
  <main id="main-area">

    <!-- ── Tab: Configuração ───────────────────────────── -->
    <div id="tab-config" class="tab-pane active">
      <div class="tab-header">
        <h2>Configurações de Conexão</h2>
      </div>

      <div class="config-container">
        <div class="form-group">
          <label>Modo de Conexão</label>
          <div style="display: flex; gap: 16px; margin-top: 8px;">
            <label style="cursor: pointer; display: flex; align-items: center; gap: 8px;">
              <input type="radio" name="ros-mode" value="local" checked onchange="App.toggleRosMode()" />
              <span>Local (localhost)</span>
            </label>
            <label style="cursor: pointer; display: flex; align-items: center; gap: 8px;">
              <input type="radio" name="ros-mode" value="wifi" onchange="App.toggleRosMode()" />
              <span>Rede WiFi (Remoto)</span>
            </label>
          </div>
        </div>

        <div class="form-group" style="margin-top: 24px; padding-top: 16px; border-top: 1px solid var(--border);">
          <label for="ros-master-uri">Master URL (ROS_MASTER_URI)</label>
          <input id="ros-master-uri" type="text" value="http://localhost:11311" placeholder="http://localhost:11311" oninput="App.onMasterUriChange()" />
        </div>

        <div id="ros-wifi-fields" class="hidden" style="margin-top: 16px;">
          <div class="form-group">
            <label for="ros-ip">Seu IP na rede (ROS_IP)</label>
            <div style="display: flex; gap: 8px;">
              <input id="ros-ip" type="text" placeholder="Detectando..." style="flex:1" />
              <button class="btn btn-ghost" onclick="App.autoDetectIp()">Detectar</button>
            </div>
            <small style="color:var(--muted); margin-top:4px; display:block">Necessário para que o robô consiga devolver dados ao dashboard.</small>
          </div>
        </div>

        <button class="btn btn-primary" onclick="App.confirmConnectROS()" id="btn-connect-ros" style="width: 100%; margin-top: 24px;">Conectar ao ROS</button>
      </div>
    </div>

    <!-- ── Tab: Windows Container ──────────────────────── -->
    <div id="windows-container" style="display:flex; flex:1; flex-direction:column; min-height:0; overflow:hidden;">
      <!-- Window content generated dynamically here -->
    </div>

  </main>
</div>

<!-- ── Modal: Nova Janela ─────────────────────────────── -->
<div class="modal-overlay hidden" id="modal-new-window" onclick="App.onOverlayClick(event,'modal-new-window')">
  <div class="modal">
    <div class="modal-header">
      <h2>Criar Nova Janela</h2>
      <button class="modal-close" onclick="App.closeModal('modal-new-window')" aria-label="Fechar">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label for="new-window-title">Nome da Janela</label>
        <input id="new-window-title" type="text" placeholder="Ex: Motores, Sensores, Câmeras..." />
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="App.closeModal('modal-new-window')">Cancelar</button>
      <button class="btn btn-primary" onclick="App.confirmNewWindow()">Criar</button>
    </div>
  </div>
</div>

<!-- ── Modal: Geração Lote ────────────────────────────── -->
<div class="modal-overlay hidden" id="modal-batch-window" onclick="App.onOverlayClick(event,'modal-batch-window')">
  <div class="modal">
    <div class="modal-header">
      <h2>Geração Automática de Janela</h2>
      <button class="modal-close" onclick="App.closeModal('modal-batch-window')" aria-label="Fechar">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label for="batch-window-title">Nome da Nova Janela</label>
        <input id="batch-window-title" type="text" placeholder="Ex: Motores Esquerda..." />
      </div>
      <div class="form-group" style="margin-top:16px;">
        <label>Modo de Geração</label>
        <div style="display: flex; gap: 16px; margin-top: 8px;">
          <label style="cursor: pointer; display: flex; align-items: center; gap: 8px;">
            <input type="radio" name="batch-mode" value="exact" checked onchange="App.onBatchModeChange()" />
            <span>Tópico Exato</span>
          </label>
          <label style="cursor: pointer; display: flex; align-items: center; gap: 8px;">
            <input type="radio" name="batch-mode" value="prefix" onchange="App.onBatchModeChange()" />
            <span>Prefixo</span>
          </label>
        </div>
      </div>

      <!-- Modo Exato: lista de tópicos disponíveis -->
      <div id="batch-exact-group" class="form-group" style="margin-top:16px;">
        <label>Tópico</label>
        <div id="batch-topics-loading" style="color:var(--text-muted,#888); font-size:12px; margin-top:6px;">
          Carregando tópicos…
        </div>
        <select id="batch-topic-select" size="6" style="width:100%; margin-top:6px; display:none;"></select>
      </div>

      <!-- Modo Prefixo: input livre + preview dos tópicos que batem -->
      <div id="batch-prefix-group" class="form-group" style="margin-top:16px; display:none;">
        <label for="batch-prefix-input">Prefixo dos Tópicos</label>
        <input id="batch-prefix-input" type="text" placeholder="Ex: /robot/motors"
               style="margin-top:6px;" oninput="App.onBatchPrefixInput()" />
        <div id="batch-prefix-preview"
             style="margin-top:8px; max-height:110px; overflow-y:auto; border:1px solid var(--border,#333);
                    border-radius:6px; padding:6px 8px; font-size:12px; display:none;">
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="App.closeModal('modal-batch-window')">Cancelar</button>
      <button class="btn btn-primary" onclick="App.confirmBatchModal()">Gerar Gráficos</button>
    </div>
  </div>
</div>

<!-- ── Modal: Adicionar Gráfico ───────────────────────── -->
<div class="modal-overlay hidden" id="modal-add" onclick="App.onOverlayClick(event,'modal-add')">
  <div class="modal">
    <div class="modal-header">
      <h2>Novo Gráfico</h2>
      <button class="modal-close" onclick="App.closeModal('modal-add')" aria-label="Fechar">✕</button>
    </div>

    <div class="modal-body">
      <!-- Título -->
      <div class="form-group">
        <label for="modal-title">Título do Gráfico</label>
        <input id="modal-title" type="text" placeholder="Ex: Velocidade Linear" />
      </div>

      <!-- Datasets -->
      <div>
        <div class="datasets-header">
          <label>Curvas (Datasets)</label>
          <button type="button" onclick="App.addDatasetRow()">+ Adicionar Curva</button>
        </div>
        <div id="dataset-rows"></div>
      </div>

      <!-- Y axis -->
      <div class="form-row">
        <div class="form-group">
          <label for="modal-ylabel">Rótulo do Eixo Y</label>
          <input id="modal-ylabel" type="text" placeholder="Ex: Velocidade (m/s)" />
        </div>
        <div class="form-group" style="max-width:140px">
          <label for="modal-yscale">Escala Y</label>
          <select id="modal-yscale">
            <option value="linear">Linear</option>
            <option value="logarithmic">Logarítmica</option>
          </select>
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label for="modal-ymin">Y Mínimo <span class="label-hint">(opcional)</span></label>
          <input id="modal-ymin" type="number" placeholder="Auto" />
        </div>
        <div class="form-group">
          <label for="modal-ymax">Y Máximo <span class="label-hint">(opcional)</span></label>
          <input id="modal-ymax" type="number" placeholder="Auto" />
        </div>
      </div>

      <!-- Stream config -->
      <div class="form-row">
        <div class="form-group">
          <label for="modal-interval">
            Intervalo (s)
            <button class="help-btn" type="button" onclick="App.openHelp('interval')" title="Ajuda sobre intervalo">ℹ️</button>
          </label>
          <input id="modal-interval" type="number" value="0.1" min="0.01" max="60" step="0.05" />
        </div>
        <div class="form-group">
          <label for="modal-maxpts">Máx. Pontos por Curva</label>
          <input id="modal-maxpts" type="number" value="200" min="10" max="2000" step="10" />
        </div>
      </div>
    </div>

    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="App.closeModal('modal-add')">Cancelar</button>
      <button class="btn btn-primary" onclick="App.confirmAddModal()">Criar Gráfico</button>
    </div>
  </div>
</div>

<!-- ── Modal: Adicionar GPS ───────────────────────────── -->
<div class="modal-overlay hidden" id="modal-add-gps" onclick="App.onOverlayClick(event,'modal-add-gps')">
  <div class="modal">
    <div class="modal-header">
      <h2>Novo Mapa GPS (ENU)</h2>
      <button class="modal-close" onclick="App.closeModal('modal-add-gps')" aria-label="Fechar">✕</button>
    </div>

    <div class="modal-body">
      <div class="form-group">
        <label for="modal-gps-title">Título do Mapa</label>
        <input id="modal-gps-title" type="text" placeholder="Ex: Trajeto do Robô" />
      </div>

      <div class="form-group">
        <label for="modal-gps-topic">Tópico ROS (NavSatFix)</label>
        <div id="gps-topic-container">
          <input type="text" id="modal-gps-topic" class="ds-topic" placeholder="/fix" autocomplete="off" />
        </div>
      </div>

      <div class="form-group" style="max-width:140px">
        <label for="modal-gps-color">Cor do Trajeto</label>
        <input type="color" id="modal-gps-color" value="#39d353" style="width:100%" />
      </div>
    </div>

    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="App.closeModal('modal-add-gps')">Cancelar</button>
      <button class="btn btn-primary" onclick="App.confirmGpsModal()">Criar Mapa</button>
    </div>
  </div>
</div>



<!-- ── Modal: Ajuda ───────────────────────────────────── -->
<div class="modal-overlay hidden" id="modal-help" onclick="App.onOverlayClick(event,'modal-help')">
  <div class="modal modal-sm">
    <div class="modal-header">
      <h2 id="help-title">Ajuda</h2>
      <button class="modal-close" onclick="App.closeModal('modal-help')">✕</button>
    </div>
    <div class="modal-body" id="help-body"></div>
  </div>
</div>

<!-- ── Toast container ────────────────────────────────── -->
<div id="toast-container"></div>

<script src="js/app.js"></script>
</body>
</html>
